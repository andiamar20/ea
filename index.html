        :root {
            --bg: #050a18;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --blue-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);

        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e293b, transparent);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }

        .btn-valetax { background: var(--blue-gradient); }
        .btn-vantage { background: #111827; border: 1px solid #374151; }
        .btn-telegram { background: var(--green-gradient); }

        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Dekorasi Lingkaran Cahaya */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;

</head>
